<!DOCTYPE html>

    <style>
        body {
            background-color: #f0f4f8;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .bg-tuya-blue {
            background-color: #4fc3f7;
        }

        .bg-tuya-green {
            background-color: #4ade80;
        }

        .bg-tuya-orange {
            background-color: #ff9800;
        }

        .bg-tuya-yellow {
            background-color: #facc15;
        }

        .bg-tuya-off {
            background-color: #d1d5db;
        }

        .btn-shadow {
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-transition {
            transition: all 0.2s ease-in-out;
        }

        .btn-active {
            transform: scale(0.95);
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #ffffff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .device-offline {
            opacity: 0.6;
            filter: grayscale(50%);
            pointer-events: none;
        }

        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }
    </style>
</head>

    <script>
        lucide.createIcons();

        function togglePassword() {
        const pwdInput = document.getElementById('mqtt-password');
        const eyeIcon = document.getElementById('eye-icon');
        if (pwdInput.type === "password") {
        pwdInput.type = "text";
        eyeIcon.setAttribute('data-lucide', 'eye-off');
        } else {
        pwdInput.type = "password";
        eyeIcon.setAttribute('data-lucide', 'eye');
        }
        lucide.createIcons();
        }

        function logDebug(msg, type = 'info') {
        const logDiv = document.getElementById('debug-log');
        if(logDiv) {
        const time = new Date().toLocaleTimeString('ko-KR', { hour12: false });
        let colorClass = 'text-green-400';
        if (type === 'recv') colorClass = 'text-blue-300';
        if (type === 'send') colorClass = 'text-yellow-300';
        if (type === 'error') colorClass = 'text-red-400';

        logDiv.innerHTML += `<span class="text-gray-500">[${time}]</span> <span class="${colorClass}">${msg}</span><br>`;
        logDiv.scrollTop = logDiv.scrollHeight;
        }
        console.log(msg);
        }

        let client = null;
        const deviceList = ['box01', 'box02'];

        const deviceStates = {
        'box01': { online: false, channels: {} },
        'box02': { online: false, channels: {} }
        };

        const colorMap = {
        1: 'bg-tuya-blue', 2: 'bg-tuya-green', 3: 'bg-tuya-orange', 4: 'bg-tuya-yellow'
        };

        function connectMQTT() {
        const url = document.getElementById('mqtt-url').value.trim();
        const username = document.getElementById('mqtt-username').value.trim();
        const password = document.getElementById('mqtt-password').value.trim();
        const errorText = document.getElementById('login-error');

        if(!url || !username || !password) {
        errorText.innerText = "접속 정보를 모두 입력하세요.";
        errorText.classList.remove('hidden');
        return;
        }

        setLoading(true);
        errorText.classList.add('hidden');
        document.getElementById('debug-log').innerHTML = '';

        const clientId = 'web_control_' + Math.random().toString(16).substring(2, 8);

        const options = {
        clientId: clientId,
        username: username,
        password: password,
        keepalive: 60,
        clean: true,
        reconnectPeriod: 0
        };

        logDebug(`접속 시도 중... (URL: ${url})`);
        client = mqtt.connect(url, options);

        client.on('connect', function () {
        logDebug("✅ 브로커 서버 로그인 성공!");
        setLoading(false);
        switchToDashboard();

        // 💡 [핵심 수정] 타이밍 이슈(Race Condition) 완벽 차단
        // 각 기기별로 명확하게 구독을 걸고, 구독이 "완벽히 승인(Granted)"된 직후에만 GET을 날립니다.
        deviceList.forEach(deviceId => {
        const baseTopic = `hdh/${deviceId}/`;
        const topicsToSub = [
        baseTopic + 'state/full',
        baseTopic + 'ch/+/state',
        baseTopic + 'meta/online'
        ];

        // 구독 신청
        client.subscribe(topicsToSub, { qos: 1 }, function(err) {
        if(!err) {
        logDebug(`📡 [${deviceId}] 통신망 구독이 서버에 등록되었습니다.`);
        // 이제 안전하므로 상태를 요청합니다.
        const reqTopic = baseTopic + 'get/state';
        logDebug(`📤 [발신] ${deviceId} 상태 요청 -> ${reqTopic}`, 'send');
        client.publish(reqTopic, "GET", { qos: 1, retain: false });
        } else {
        logDebug(`❌ [${deviceId}] 구독 에러 발생: ${err}`, 'error');
        }
        });
        });
        });

        client.on('error', function (err) {
        logDebug("❌ 접속 에러 발생", 'error');
        setLoading(false);
        errorText.innerHTML = "연결 실패. 비밀번호 오타가 없거나, 8884 포트가 막혔는지 확인하세요.";
        errorText.classList.remove('hidden');
        if (client) client.end();
        });

        // ---------------------------------------------------------
        // 수신 로직 (파싱 및 디버그 출력)
        // ---------------------------------------------------------
        client.on('message', function (topic, message) {
        const payload = message.toString();
        logDebug(`📥 [수신] ${topic} : ${payload}`, 'recv');

        const parts = topic.split('/');
        if (parts[0] !== 'hdh') return;

        const deviceId = parts[1];
        if (!deviceId || !deviceList.includes(deviceId)) return;

        try {
        // 전체 상태 파싱
        if (topic.endsWith('/state/full')) {
        const data = JSON.parse(payload);
        if (data.ch && Array.isArray(data.ch)) {
        data.ch.forEach(c => {
        updateChannelUI(deviceId, c.n, c.relay, c.mode);
        });
        updateOnlineStatus(deviceId, true);
        }
        }
        // 개별 상태 파싱
        else if (topic.includes('/ch/') && topic.endsWith('/state')) {
        const chNum = parseInt(parts[3], 10);
        const data = JSON.parse(payload);
        if(chNum && data.hasOwnProperty('relay')) {
        updateChannelUI(deviceId, chNum, data.relay, data.mode);
        }
        }
        // 연결 상태 파싱
        else if (topic.endsWith('/meta/online')) {
        const data = JSON.parse(payload);
        updateOnlineStatus(deviceId, data.online);
        }
        } catch (e) {
        logDebug(`❌ JSON 해석 오류: ${e.message}`, 'error');
        }
        });
        }

        function requestAllStates() {
        if(client && client.connected) {
        deviceList.forEach(deviceId => {
        const reqTopic = `hdh/${deviceId}/get/state`;
        logDebug(`📤 [발신] 수동 상태 요청 -> ${reqTopic}`, 'send');
        client.publish(reqTopic, "GET", { qos: 1, retain: false });
        });
        }
        }

        function disconnectMQTT() {
        if(client && client.connected) client.end();
        document.getElementById('dashboard-view').classList.add('hidden');
        document.getElementById('dashboard-view').classList.remove('opacity-100');
        document.getElementById('login-view').classList.remove('hidden');

        deviceList.forEach(dev => updateOnlineStatus(dev, false, true));
        }

        function toggleChannel(deviceId, chNum) {
        if(!client || !client.connected) {
        alert("관제 서버와 연결되어 있지 않습니다.");
        return;
        }

        if(deviceStates[deviceId] && deviceStates[deviceId].online === false) {
        alert(`${deviceId} 기기가 오프라인입니다. 아두이노 전원과 와이파이를 확인하세요.`);
        return;
        }

        const btnElement = document.getElementById(`btn-${deviceId}-ch${chNum}`);
        if(btnElement) {
        btnElement.classList.add('btn-active');
        setTimeout(() => btnElement.classList.remove('btn-active'), 150);
        }

        const currentState = deviceStates[deviceId].channels[chNum]?.relay || false;
        const targetCommand = currentState ? "OFF" : "ON";
        const topic = `hdh/${deviceId}/ch/${chNum}/cmd`;

        logDebug(`📤 [발신] 제어 명령 -> ${topic} : ${targetCommand}`, 'send');
        client.publish(topic, targetCommand, { qos: 1, retain: false });

        // 즉각적인 시각 피드백
        updateChannelUI(deviceId, chNum, !currentState, deviceStates[deviceId].channels[chNum]?.mode || 0);
        }

        function updateChannelUI(deviceId, chNum, isRelayOn, mode) {
        if(!deviceStates[deviceId].channels[chNum]) deviceStates[deviceId].channels[chNum] = {};
        deviceStates[deviceId].channels[chNum].relay = isRelayOn;
        deviceStates[deviceId].channels[chNum].mode = mode;

        const btnElement = document.getElementById(`btn-${deviceId}-ch${chNum}`);
        const indicatorElement = document.getElementById(`ind-${deviceId}-ch${chNum}`);
        const modeBadge = document.getElementById(`mode-${deviceId}-ch${chNum}`);

        if (!btnElement || !indicatorElement) return;

        const colorClass = colorMap[chNum] || 'bg-tuya-blue';

        if (isRelayOn) {
        btnElement.classList.remove('bg-tuya-off');
        btnElement.classList.add(colorClass);
        indicatorElement.innerHTML = `<i data-lucide="power" class="w-3 h-3 mr-0.5 text-blue-500"></i><span class="text-blue-500 font-bold">ON</span>`;
        } else {
        btnElement.classList.remove(colorClass);
        btnElement.classList.add('bg-tuya-off');
        indicatorElement.innerHTML = `<i data-lucide="power" class="w-3 h-3 mr-0.5"></i>OFF`;
        }

        if (mode !== 0 && modeBadge) {
        modeBadge.classList.remove('hidden');
        if (mode === 1) { modeBadge.innerText = '스케줄'; }
        else if (mode === 2) { modeBadge.innerText = '순환'; }
        else if (mode === 3) { modeBadge.innerText = '인칭'; }
        } else if (modeBadge) {
        modeBadge.classList.add('hidden');
        }

        lucide.createIcons();
        }

        function updateOnlineStatus(deviceId, isOnline, forceOffline = false) {
        deviceStates[deviceId].online = forceOffline ? false : isOnline;

        const card = document.getElementById(`card-${deviceId}`);
        const badge = document.getElementById(`status-badge-${deviceId}`);
        if(!card || !badge) return;

        if(isOnline && !forceOffline) {
        card.classList.remove('device-offline');
        badge.classList.remove('bg-gray-500', 'bg-red-500');
        badge.classList.add('bg-green-500');
        badge.innerText = '온라인';
        } else {
        card.classList.add('device-offline');
        badge.classList.remove('bg-gray-500', 'bg-green-500');
        badge.classList.add('bg-red-500');
        badge.innerText = '오프라인';
        }
        }

        function setLoading(isLoading) {
        const btnText = document.getElementById('btn-login-text');
        const spinner = document.getElementById('btn-login-spinner');
        const btn = document.getElementById('btn-login');

        if(isLoading) {
        btnText.innerText = "서버 인증 중...";
        spinner.classList.remove('hidden');
        btn.disabled = true;
        btn.classList.add('opacity-80');
        } else {
        btnText.innerText = "통합 관제 연결";
        spinner.classList.add('hidden');
        btn.disabled = false;
        btn.classList.remove('opacity-80');
        }
        }

        function switchToDashboard() {
        const loginView = document.getElementById('login-view');
        const dashboardView = document.getElementById('dashboard-view');
        loginView.classList.add('hidden');
        dashboardView.classList.remove('hidden');
        setTimeout(() => { dashboardView.classList.add('opacity-100'); }, 50);
        }
    </script>
</body>
</html>
