    <style>
        body {
            background-color: #f0f4f8;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .bg-tuya-blue {
            background-color: #4fc3f7;
        }

        .bg-tuya-green {
            background-color: #4ade80;
        }

        .bg-tuya-orange {
            background-color: #ff9800;
        }

        .bg-tuya-yellow {
            background-color: #facc15;
        }

        .bg-tuya-off {
            background-color: #d1d5db;
        }

        .btn-shadow {
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-transition {
            transition: all 0.2s ease-in-out;
        }

        .btn-active {
            transform: scale(0.95);
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #ffffff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .device-offline {
            opacity: 0.6;
            filter: grayscale(50%);
            pointer-events: none;
        }

        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }
    </style>
</head>

    <script>
        lucide.createIcons();

        function togglePassword() {
        const pwdInput = document.getElementById('mqtt-password');
        const eyeIcon = document.getElementById('eye-icon');
        if (pwdInput.type === "password") {
        pwdInput.type = "text";
        eyeIcon.setAttribute('data-lucide', 'eye-off');
        } else {
        pwdInput.type = "password";
        eyeIcon.setAttribute('data-lucide', 'eye');
        }
        lucide.createIcons();
        }

        function logDebug(msg, type = 'info') {
        const logDiv = document.getElementById('debug-log');
        if(logDiv) {
        const time = new Date().toLocaleTimeString('ko-KR', { hour12: false });
        let colorClass = 'text-green-400';
        if (type === 'recv') colorClass = 'text-blue-300';
        if (type === 'send') colorClass = 'text-yellow-300';
        if (type === 'error') colorClass = 'text-red-400';

        logDiv.innerHTML += `<span class="text-gray-500">[${time}]</span> <span class="${colorClass}">${msg}</span><br>`;
        logDiv.scrollTop = logDiv.scrollHeight;
        }
        console.log(msg);
        }

        let client = null;
        const deviceList = ['box01', 'box02'];
        const maxChannels = 12;
        const allChannels = Array.from({ length: maxChannels }, (_, i) => i + 1);

        const deviceStates = {
        'box01': { online: false, cfgLoaded: false, cfgSeen: {}, channels: {}, meta: { last_seen: 0, last_connect: 0 } },
        'box02': { online: false, cfgLoaded: false, cfgSeen: {}, channels: {}, meta: { last_seen: 0, last_connect: 0 } }
        };

        const channelColorClasses = ['bg-tuya-blue', 'bg-tuya-green', 'bg-tuya-orange', 'bg-tuya-yellow'];

        renderAllDevices();

        function connectMQTT() {
        const url = document.getElementById('mqtt-url').value.trim();
        const username = document.getElementById('mqtt-username').value.trim();
        const password = document.getElementById('mqtt-password').value.trim();
        const errorText = document.getElementById('login-error');

        if(!url || !username || !password) {
        errorText.innerText = "접속 정보를 모두 입력하세요.";
        errorText.classList.remove('hidden');
        return;
        }

        setLoading(true);
        errorText.classList.add('hidden');
        document.getElementById('debug-log').innerHTML = '';

        const clientId = 'web_control_' + Math.random().toString(16).substring(2, 8);

        const options = {
        clientId: clientId,
        username: username,
        password: password,
        keepalive: 60,
        clean: true,
        reconnectPeriod: 0
        };

        logDebug(`접속 시도 중... (URL: ${url})`);
        client = mqtt.connect(url, options);

        client.on('connect', function () {
        logDebug("✅ 브로커 서버 로그인 성공!");
        setLoading(false);
        switchToDashboard();

        // 💡 [핵심 수정] 타이밍 이슈(Race Condition) 완벽 차단
        // 각 기기별로 명확하게 구독을 걸고, 구독이 "완벽히 승인(Granted)"된 직후에만 GET을 날립니다.
        deviceList.forEach(deviceId => {
        const baseTopic = `hdh/${deviceId}/`;
        const topicsToSub = [
        baseTopic + 'state/full',
        baseTopic + 'ch/+/state',
        baseTopic + 'ch/+/cfg',
        baseTopic + 'meta/online',
        baseTopic + 'meta/last_seen',
        baseTopic + 'meta/last_connect'
        ];

        // 구독 신청
        client.subscribe(topicsToSub, { qos: 1 }, function(err) {
        if(!err) {
        logDebug(`📡 [${deviceId}] 통신망 구독이 서버에 등록되었습니다.`);
        // 이제 안전하므로 상태를 요청합니다.
        const reqTopic = baseTopic + 'get/state';
        logDebug(`📤 [발신] ${deviceId} 상태 요청 -> ${reqTopic}`, 'send');
        client.publish(reqTopic, "GET", { qos: 1, retain: false });
        requestChannelConfigs(deviceId);
        } else {
        logDebug(`❌ [${deviceId}] 구독 에러 발생: ${err}`, 'error');
        }
        });
        });
        });

        client.on('error', function (err) {
        logDebug("❌ 접속 에러 발생", 'error');
        setLoading(false);
        errorText.innerHTML = "연결 실패. 비밀번호 오타가 없거나, 8884 포트가 막혔는지 확인하세요.";
        errorText.classList.remove('hidden');
        if (client) client.end();
        });

        // ---------------------------------------------------------
        // 수신 로직 (파싱 및 디버그 출력)
        // ---------------------------------------------------------
        client.on('message', function (topic, message) {
        const payload = message.toString();
        logDebug(`📥 [수신] ${topic} : ${payload}`, 'recv');

        const parts = topic.split('/');
        if (parts[0] !== 'hdh') return;

        const deviceId = parts[1];
        if (!deviceId || !deviceList.includes(deviceId)) return;

        try {
        // 전체 상태 파싱
        if (topic.endsWith('/state/full')) {
        const data = JSON.parse(payload);
        if (data.ch && Array.isArray(data.ch)) {
        data.ch.forEach(c => {
        updateChannelUI(deviceId, c.n, c.relay, c.mode);
        if (c.hasOwnProperty('name')) updateChannelConfig(deviceId, c.n, c);
        });
        updateOnlineStatus(deviceId, true);
        }
        }
        // 개별 상태 파싱
        else if (topic.includes('/ch/') && topic.endsWith('/state')) {
        const chNum = parseInt(parts[3], 10);
        const data = JSON.parse(payload);
        if(chNum && data.hasOwnProperty('relay')) {
        updateChannelUI(deviceId, chNum, data.relay, data.mode);
        if (data.hasOwnProperty('name')) updateChannelConfig(deviceId, chNum, data);
        }
        }
        // 채널 설정 파싱
        else if (topic.includes('/ch/') && topic.endsWith('/cfg')) {
        const chNum = parseInt(parts[3], 10);
        const data = JSON.parse(payload);
        if(chNum) {
        updateChannelConfig(deviceId, chNum, data);
        }
        }
        // 연결 상태 파싱
        else if (topic.endsWith('/meta/online')) {
        const data = JSON.parse(payload);
        updateOnlineStatus(deviceId, data.online);
        }
        else if (topic.endsWith('/meta/last_seen')) {
        const data = JSON.parse(payload);
        if (data && typeof data.epoch === 'number') deviceStates[deviceId].meta.last_seen = data.epoch;
        renderDevice(deviceId);
        }
        else if (topic.endsWith('/meta/last_connect')) {
        const data = JSON.parse(payload);
        if (data && typeof data.epoch === 'number') deviceStates[deviceId].meta.last_connect = data.epoch;
        renderDevice(deviceId);
        }
        } catch (e) {
        logDebug(`❌ JSON 해석 오류: ${e.message}`, 'error');
        }
        });
        }

        function formatEpoch(epoch) {
        const n = Number(epoch) || 0;
        if(!n) return '';
        const d = new Date(n * 1000);
        return d.toLocaleString('ko-KR', { hour12: false });
        }

        function requestAllStates() {
        if(client && client.connected) {
        deviceList.forEach(deviceId => {
        const reqTopic = `hdh/${deviceId}/get/state`;
        logDebug(`📤 [발신] 수동 상태 요청 -> ${reqTopic}`, 'send');
        client.publish(reqTopic, "GET", { qos: 1, retain: false });
        requestChannelConfigs(deviceId);
        });
        }
        }

        function requestChannelConfigs(deviceId) {
        if(!client || !client.connected) return;

        deviceStates[deviceId].cfgLoaded = false;
        deviceStates[deviceId].cfgSeen = {};
        renderDevice(deviceId);

        logDebug(`📤 [발신] ${deviceId} 채널 설정 요청 (CH1-CH${maxChannels})`, 'send');
        allChannels.forEach(chNum => {
        const reqTopic = `hdh/${deviceId}/get/ch/${chNum}`;
        client.publish(reqTopic, "GET", { qos: 1, retain: false });
        });
        }

        function disconnectMQTT() {
        if(client && client.connected) client.end();
        document.getElementById('dashboard-view').classList.add('hidden');
        document.getElementById('dashboard-view').classList.remove('opacity-100');
        document.getElementById('login-view').classList.remove('hidden');

        deviceList.forEach(dev => updateOnlineStatus(dev, false, true));
        }

        function toggleChannel(deviceId, chNum) {
        if(!client || !client.connected) {
        alert("관제 서버와 연결되어 있지 않습니다.");
        return;
        }

        if(deviceStates[deviceId] && deviceStates[deviceId].online === false) {
        alert(`${deviceId} 기기가 오프라인입니다. 아두이노 전원과 와이파이를 확인하세요.`);
        return;
        }

        const btnElement = document.getElementById(`btn-${deviceId}-ch${chNum}`);
        if(btnElement) {
        btnElement.classList.add('btn-active');
        setTimeout(() => btnElement.classList.remove('btn-active'), 150);
        }

        const currentState = deviceStates[deviceId].channels[chNum]?.relay || false;
        const targetCommand = currentState ? "OFF" : "ON";
        const topic = `hdh/${deviceId}/ch/${chNum}/cmd`;

        logDebug(`📤 [발신] 제어 명령 -> ${topic} : ${targetCommand}`, 'send');
        client.publish(topic, targetCommand, { qos: 1, retain: false });

        // 즉각적인 시각 피드백
        updateChannelUI(deviceId, chNum, !currentState, deviceStates[deviceId].channels[chNum]?.mode || 0);
        }

        function updateChannelUI(deviceId, chNum, isRelayOn, mode) {
        const channel = ensureChannelState(deviceId, chNum);
        channel.relay = !!isRelayOn;
        channel.mode = Number(mode) || 0;
        renderDevice(deviceId);
        }

        function updateChannelConfig(deviceId, chNum, data) {
        const channel = ensureChannelState(deviceId, chNum);
        deviceStates[deviceId].cfgSeen[chNum] = true;
        deviceStates[deviceId].cfgLoaded = allChannels.every(num => deviceStates[deviceId].cfgSeen[num]);

        if (data.hasOwnProperty('name')) {
        channel.name = String(data.name || '').trim();
        }
        if (data.hasOwnProperty('pin')) {
        channel.pin = Number(data.pin);
        }
        if (data.hasOwnProperty('lvl')) {
        channel.lvl = Number(data.lvl);
        }
        if (data.hasOwnProperty('init')) {
        channel.init = Number(data.init);
        }
        if (data.hasOwnProperty('mode')) {
        channel.mode = Number(data.mode) || 0;
        }

        renderDevice(deviceId);
        }

        function addChannel(deviceId) {
        if(!client || !client.connected) {
        alert("관제 서버와 연결되어 있지 않습니다.");
        return;
        }
        if(deviceStates[deviceId] && deviceStates[deviceId].online === false) {
        alert(`${deviceId} 기기가 오프라인입니다. 아두이노 전원과 와이파이를 확인하세요.`);
        return;
        }

        const chSelect = document.getElementById(`new-${deviceId}-ch`);
        const pinInput = document.getElementById(`new-${deviceId}-pin`);
        const nameInput = document.getElementById(`new-${deviceId}-name`);
        const chNum = parseInt(chSelect?.value, 10);
        const pin = parseInt(pinInput?.value, 10);
        const name = (nameInput?.value || '').trim();

        if(!chNum || chNum < 1 || chNum > maxChannels) {
        setAddError(deviceId, "추가할 채널을 선택하세요.");
        return;
        }
        if(isAssignedChannel(deviceId, chNum)) {
        setAddError(deviceId, `CH${chNum}은 이미 이름이 지정되어 있습니다.`);
        return;
        }
        if(!Number.isInteger(pin) || pin < 0 || pin > 127) {
        setAddError(deviceId, "GPIO Pin은 0~127 사이 숫자로 입력하세요.");
        return;
        }
        if(!name) {
        setAddError(deviceId, "채널 이름을 입력하세요.");
        return;
        }
        if(/\s/.test(name)) {
        setAddError(deviceId, "현재 펌웨어 형식상 채널 이름에는 공백을 넣을 수 없습니다.");
        return;
        }
        if(getUtf8ByteLength(name) > 15) {
        setAddError(deviceId, "채널 이름은 UTF-8 기준 15바이트 이하여야 합니다.");
        return;
        }

        const pinTopic = `hdh/${deviceId}/cfg/ch/${chNum}/pin`;
        const nameTopic = `hdh/${deviceId}/cfg/ch/${chNum}/name`;
        const pinPayload = `${pin} 1 0`;

        logDebug(`📤 [발신] 채널 핀 설정 -> ${pinTopic} : ${pinPayload}`, 'send');
        client.publish(pinTopic, pinPayload, { qos: 1, retain: false });
        logDebug(`📤 [발신] 채널 이름 설정 -> ${nameTopic} : ${name}`, 'send');
        client.publish(nameTopic, name, { qos: 1, retain: false });

        updateChannelConfig(deviceId, chNum, { name, pin, lvl: 1, init: 0, mode: 0 });
        updateChannelUI(deviceId, chNum, false, 0);
        setAddError(deviceId, "");
        pinInput.value = '';
        nameInput.value = '';

        setTimeout(() => requestChannelConfig(deviceId, chNum), 500);
        }

        function requestChannelConfig(deviceId, chNum) {
        if(!client || !client.connected) return;
        const reqTopic = `hdh/${deviceId}/get/ch/${chNum}`;
        client.publish(reqTopic, "GET", { qos: 1, retain: false });
        }

        function ensureChannelState(deviceId, chNum) {
        if(!deviceStates[deviceId].channels[chNum]) {
        deviceStates[deviceId].channels[chNum] = { relay: false, mode: 0, name: '' };
        }
        return deviceStates[deviceId].channels[chNum];
        }

        function isAssignedChannel(deviceId, chNum) {
        const name = deviceStates[deviceId].channels[chNum]?.name;
        return typeof name === 'string' && name.trim().length > 0;
        }

        function getAssignedChannels(deviceId) {
        return allChannels.filter(chNum => isAssignedChannel(deviceId, chNum));
        }

        function renderAllDevices() {
        deviceList.forEach(deviceId => renderDevice(deviceId));
        }

        function renderDevice(deviceId) {
        renderChannelIndicators(deviceId);
        renderChannelButtons(deviceId);
        renderAddChannelOptions(deviceId);
        lucide.createIcons();
        }

        function renderChannelIndicators(deviceId) {
        const indicatorWrap = document.getElementById(`indicators-${deviceId}`);
        if(!indicatorWrap) return;

        const assignedChannels = getAssignedChannels(deviceId);
        if(assignedChannels.length === 0) {
        indicatorWrap.innerHTML = '<span class="text-gray-400">등록된 채널 없음</span>';
        return;
        }

        indicatorWrap.innerHTML = assignedChannels.map(chNum => {
        const channel = ensureChannelState(deviceId, chNum);
        const on = !!channel.relay;
        const statusClass = on ? 'text-blue-500 font-bold' : '';
        return `<span id="ind-${deviceId}-ch${chNum}" class="flex items-center ${statusClass}"><i data-lucide="power" class="w-3 h-3 mr-0.5"></i>${on ? 'ON' : 'OFF'}</span>`;
        }).join('');
        }

        function renderChannelButtons(deviceId) {
        const container = document.getElementById(`channels-${deviceId}`);
        if(!container) return;

        const assignedChannels = getAssignedChannels(deviceId);
        if(assignedChannels.length === 0) {
        container.innerHTML = '<div class="text-center text-xs font-bold text-gray-400 py-5 bg-gray-50 rounded-xl" style="grid-column:1/-1;">이름이 지정된 채널이 없습니다.</div>';
        return;
        }

        container.innerHTML = assignedChannels.map(chNum => renderChannelButton(deviceId, chNum)).join('');
        }

        function renderChannelButton(deviceId, chNum) {
        const channel = ensureChannelState(deviceId, chNum);
        const name = escapeHtml(channel.name || `CH${chNum}`);
        const isRelayOn = !!channel.relay;
        const mode = Number(channel.mode) || 0;
        const colorClass = isRelayOn ? getChannelColorClass(chNum) : 'bg-tuya-off';
        const modeText = getModeText(mode);
        const modeClass = mode === 0 ? 'hidden' : '';

        return `
        <button type="button" class="flex flex-col items-center gap-2 cursor-pointer w-full text-center" style="min-height:96px;" onclick="toggleChannel('${deviceId}', ${chNum})">
            <div id="btn-${deviceId}-ch${chNum}" class="w-12 h-12 rounded-full ${colorClass} flex items-center justify-center text-white btn-shadow btn-transition relative">
                <i data-lucide="power" class="w-5 h-5"></i>
                <span id="mode-${deviceId}-ch${chNum}" class="absolute -top-2 -right-4 text-[10px] bg-gray-700 text-white px-2 py-0.5 rounded-full font-bold shadow-sm whitespace-nowrap ${modeClass}">${modeText}</span>
            </div>
            <span id="label-${deviceId}-ch${chNum}" class="text-[13px] font-bold text-gray-700 text-center leading-tight w-full" style="word-break:keep-all; overflow-wrap:anywhere;">${name}<br><span class="text-[10px] text-gray-400 font-normal">(CH${chNum})</span></span>
        </button>`;
        }

        function renderAddChannelOptions(deviceId) {
        const select = document.getElementById(`new-${deviceId}-ch`);
        const button = document.getElementById(`add-${deviceId}-btn`);
        if(!select || !button) return;

        const current = select.value;
        const available = allChannels.filter(chNum => !isAssignedChannel(deviceId, chNum));

        if(!deviceStates[deviceId].cfgLoaded) {
        select.innerHTML = '<option value="">확인 중</option>';
        select.disabled = true;
        button.disabled = true;
        button.classList.add('opacity-50');
        return;
        }

        if(available.length === 0) {
        select.innerHTML = '<option value="">가득 참</option>';
        select.disabled = true;
        button.disabled = true;
        button.classList.add('opacity-50');
        return;
        }

        select.disabled = false;
        button.disabled = false;
        button.classList.remove('opacity-50');
        select.innerHTML = available.map(chNum => `<option value="${chNum}">CH${chNum}</option>`).join('');
        if(available.includes(Number(current))) select.value = current;
        }

        function getChannelColorClass(chNum) {
        return channelColorClasses[(chNum - 1) % channelColorClasses.length];
        }

        function getModeText(mode) {
        if (mode === 1) return '스케줄';
        if (mode === 2) return '순환';
        if (mode === 3) return '인칭';
        return '모드';
        }

        function setAddError(deviceId, message) {
        const errorElement = document.getElementById(`add-error-${deviceId}`);
        if(!errorElement) return;
        errorElement.innerText = message;
        errorElement.classList.toggle('hidden', !message);
        }

        function getUtf8ByteLength(value) {
        return new TextEncoder().encode(value).length;
        }

        function escapeHtml(value) {
        return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
        }

        function updateOnlineStatus(deviceId, isOnline, forceOffline = false) {
        deviceStates[deviceId].online = forceOffline ? false : isOnline;

        const card = document.getElementById(`card-${deviceId}`);
        const badge = document.getElementById(`status-badge-${deviceId}`);
        if(!card || !badge) return;

        if(isOnline && !forceOffline) {
        card.classList.remove('device-offline');
        badge.classList.remove('bg-gray-500', 'bg-red-500');
        badge.classList.add('bg-green-500');
        badge.innerText = '온라인';
        } else {
        card.classList.add('device-offline');
        badge.classList.remove('bg-gray-500', 'bg-green-500');
        badge.classList.add('bg-red-500');
        const lastSeen = deviceStates[deviceId]?.meta?.last_seen || 0;
        const lastConnect = deviceStates[deviceId]?.meta?.last_connect || 0;
        const t = formatEpoch(lastSeen || lastConnect);
        badge.innerText = t ? `오프라인 (${t})` : '오프라인';
        }
        }

        function setLoading(isLoading) {
        const btnText = document.getElementById('btn-login-text');
        const spinner = document.getElementById('btn-login-spinner');
        const btn = document.getElementById('btn-login');

        if(isLoading) {
        btnText.innerText = "서버 인증 중...";
        spinner.classList.remove('hidden');
        btn.disabled = true;
        btn.classList.add('opacity-80');
        } else {
        btnText.innerText = "통합 관제 연결";
        spinner.classList.add('hidden');
        btn.disabled = false;
        btn.classList.remove('opacity-80');
        }
        }

        function switchToDashboard() {
        const loginView = document.getElementById('login-view');
        const dashboardView = document.getElementById('dashboard-view');
        loginView.classList.add('hidden');
        dashboardView.classList.remove('hidden');
        setTimeout(() => { dashboardView.classList.add('opacity-100'); }, 50);
        }
    </script>
</body>
</html>
